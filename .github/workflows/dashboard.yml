name: Refresh Email Dashboard

on:
  # Triggers when user clicks Refresh or Delete on the dashboard
  push:
    paths:
      - 'commands/**'

  # Daily morning refresh at 6:45am PT (1:45pm UTC during PDT)
  schedule:
    - cron: '45 13 * * *'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

# Only allow one run at a time (cancel in-progress if new push arrives)
concurrency:
  group: dashboard-refresh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run dashboard refresh
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scripts/refresh_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@email-dashboard.local"

          # Stage the new dashboard
          git add index.html

          # Remove processed command files
          git rm -f commands/refresh.json 2>/dev/null || true
          git rm -f commands/delete.json 2>/dev/null || true

          # Commit (skip if nothing changed)
          git diff --cached --quiet || git commit -m "Dashboard refresh - $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Pull any changes that happened during our run, then push
          git pull --rebase origin main
          git push origin main
